<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase テスト</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
.box{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;border-left:4px solid #ccc}
.box.ok{border-color:#4caf50}
.box.err{border-color:#f44336}
.box.wait{border-color:#ff9800}
h3{margin:0 0 4px;font-size:15px}
p{margin:0;font-size:13px;color:#666;word-break:break-all}
</style>
</head>
<body>
<h2 style="margin-bottom:16px">🔍 Firebase 接続テスト</h2>
<div id="log"></div>

<script type="module">
function log(title, msg, status){
  const d = document.createElement('div');
  d.className = 'box ' + status;
  d.innerHTML = `<h3>${title}</h3><p>${msg}</p>`;
  document.getElementById('log').appendChild(d);
}

log('開始', 'テスト開始...', 'wait');

try {
  log('SDK読み込み', 'Firebase SDKをインポート中...', 'wait');
  
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  log('SDK読み込み', 'firebase-app OK', 'ok');

  const { getFirestore, doc, setDoc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  log('Firestore SDK', 'firebase-firestore OK', 'ok');

  const firebaseConfig = {
    apiKey: "AIzaSyCq6NPue1EPOpJjd3_jOiFNlB_kzFxtPLk",
    authDomain: "family-health-16818.firebaseapp.com",
    projectId: "family-health-16818",
    storageBucket: "family-health-16818.firebasestorage.app",
    messagingSenderId: "321561504343",
    appId: "1:321561504343:web:84c6099b02017a5a1f9112"
  };

  log('初期化', 'Firebase初期化中...', 'wait');
  const app = initializeApp(firebaseConfig);
  log('初期化', 'Firebase初期化 OK', 'ok');

  const db = getFirestore(app);
  log('Firestore', 'Firestore接続中...', 'wait');

  await setDoc(doc(db, 'test', 'ping'), { time: new Date().toISOString() });
  log('書き込み', 'Firestoreへの書き込み OK ✅', 'ok');

  const snap = await getDoc(doc(db, 'test', 'ping'));
  log('読み込み', 'Firestoreからの読み込み OK ✅ : ' + snap.data().time, 'ok');

  log('完了', '🎉 すべて正常！アプリが動くはずです。', 'ok');

} catch(e) {
  log('エラー ❌', e.message || String(e), 'err');
}
</script>
</body>
</html>
