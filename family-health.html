<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家族の健康手帳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:14px 16px;background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.logo{width:38px;height:38px;border-radius:50%;background:#e8f4ff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header h1{font-size:17px;font-weight:600}
.sync{margin-left:auto;font-size:11px;color:#4caf50}
.sync.err{color:#f44336}
.section{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.member-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.mwrap{display:flex;align-items:center;gap:1px}
.mbtn{padding:7px 15px;border-radius:999px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:14px;color:#666;font-family:inherit}
.mbtn.active{background:#1976d2;color:#fff;border-color:#1976d2}
.edbtn{font-size:14px;cursor:pointer;color:#ccc;background:none;border:none;padding:2px 4px;opacity:0}
.mwrap:hover .edbtn{opacity:1}
.addbtn{padding:7px 13px;border-radius:999px;border:1.5px dashed #ccc;background:transparent;cursor:pointer;font-size:13px;color:#aaa;font-family:inherit}
.addform{display:none;gap:8px;margin-top:10px}
.addform input{flex:1;padding:8px 12px;border:1.5px solid #ddd;border-radius:999px;font-size:14px;font-family:inherit;outline:none}
.addform button{padding:8px 16px;border-radius:999px;background:#1976d2;border:none;color:#fff;font-size:14px;cursor:pointer;font-family:inherit}
.tabs{display:flex;background:#fff;border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tab{flex:1;padding:11px 4px;font-size:12px;cursor:pointer;color:#aaa;border:none;background:none;border-bottom:2.5px solid transparent;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab span{font-size:18px}
.tab.active{color:#1976d2;border-bottom-color:#1976d2;background:#f0f7ff}
.content{background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);min-height:280px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.card{background:#f8f9ff;border-radius:12px;padding:13px;cursor:pointer;border:1.5px solid transparent}
.card:hover{border-color:#c5d5f0}
.clabel{font-size:11px;color:#888;margin-bottom:5px}
.cval{font-size:22px;font-weight:600}
.cunit{font-size:12px;color:#aaa;font-weight:400;margin-left:2px}
.ctrend{font-size:11px;color:#4caf50;margin-top:3px}
.ctrend.bad{color:#e53935}
.pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;margin-left:4px;font-weight:500}
.pill.ok{background:#e8f5e9;color:#388e3c}
.pill.warn{background:#fff3e0;color:#f57c00}
.pill.danger{background:#ffebee;color:#c62828}
.recbtn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;background:#f8f9ff;border:1.5px solid #e0e8ff;border-radius:12px;cursor:pointer;color:#1976d2;font-size:14px;margin-bottom:10px;font-family:inherit}
.stitle{font-size:12px;font-weight:600;color:#aaa;margin:14px 0 7px;letter-spacing:.5px;text-transform:uppercase}
.hrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.hrow:last-child{border:none}
.hdate{color:#aaa}
.hval{font-weight:500}
.nodata{color:#ccc;font-size:13px;text-align:center;padding:20px 0}
.chart{background:#f8f9ff;border-radius:12px;padding:12px;margin-bottom:8px}
.goalbar{height:5px;background:#e0e0e0;border-radius:999px;margin-top:5px;overflow:hidden}
.goalfill{height:100%;background:#4caf50;border-radius:999px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 32px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.mhandle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:14px}
.modal label{font-size:13px;color:#888;display:block;margin:12px 0 4px}
.modal input,.modal select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;outline:none;background:#fafafa}
.mbtns{display:flex;gap:10px;margin-top:16px}
.mbtns button{flex:1;padding:12px;border-radius:12px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500;border:none}
.bcnl{background:#f0f0f0;color:#666}
.bsave{background:#1976d2;color:#fff}
.bdel{width:100%;padding:11px;border-radius:12px;font-size:14px;cursor:pointer;background:#ffebee;color:#c62828;border:none;margin-top:8px;font-family:inherit}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:#aaa;font-size:14px}
.spin{width:26px;height:26px;border:3px solid #e0e0e0;border-top-color:#1976d2;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="root"><div class="loading"><div class="spin"></div>読み込み中...</div></div>

<script>
// Firebase を UMD 版で読み込む
const s1 = document.createElement('script');
s1.src = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js';
document.head.appendChild(s1);

s1.onload = function() {
  const s2 = document.createElement('script');
  s2.src = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js';
  document.head.appendChild(s2);
  s2.onload = initApp;
  s2.onerror = function(){ showError('Firestore SDK 読み込み失敗'); };
};
s1.onerror = function(){ showError('Firebase SDK 読み込み失敗'); };

function showError(msg) {
  document.getElementById('root').innerHTML = '<div class="loading" style="color:#e53935">❌ ' + msg + '</div>';
}

function initApp() {
  try {
    firebase.initializeApp({
      apiKey: "AIzaSyCq6NPue1EPOpJjd3_jOiFNlB_kzFxtPLk",
      authDomain: "family-health-16818.firebaseapp.com",
      projectId: "family-health-16818",
      storageBucket: "family-health-16818.firebasestorage.app",
      messagingSenderId: "321561504343",
      appId: "1:321561504343:web:84c6099b02017a5a1f9112"
    });
  } catch(e) { /* already initialized */ }

  const db = firebase.firestore();

  let members = [];
  let cur = '';
  let tab = 'vital';

  function today() {
    return new Date().toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
  }

  async function getMembers() {
    try {
      const snap = await db.collection('health').doc('__members__').get();
      if (snap.exists) return snap.data().list || [];
      const def = ['お父さん','お母さん','子供'];
      await db.collection('health').doc('__members__').set({list: def});
      return def;
    } catch(e) {
      showError('Firestore接続エラー: ' + e.message);
      return [];
    }
  }

  async function saveMembers() {
    await db.collection('health').doc('__members__').set({list: members});
  }

  async function getData(name, type) {
    try {
      const snap = await db.collection('health').doc(name + '_' + type).get();
      return snap.exists ? (snap.data().records || []) : [];
    } catch(e) { return []; }
  }

  async function saveData(name, type, records) {
    setSyncStatus('syncing');
    await db.collection('health').doc(name + '_' + type).set({records});
    setSyncStatus('ok');
  }

  function setSyncStatus(s) {
    const el = document.getElementById('syncEl');
    if (!el) return;
    el.className = 'sync' + (s==='err'?' err':'');
    el.textContent = s==='ok' ? '✓ 同期済み' : s==='syncing' ? '⟳ 同期中' : '✗ エラー';
  }

  function pill(type, val) {
    if (type==='bp') {
      const v=parseInt(val);
      if(v<120) return '<span class="pill ok">正常</span>';
      if(v<130) return '<span class="pill warn">やや高め</span>';
      return '<span class="pill danger">要注意</span>';
    }
    if (type==='temp') {
      const v=parseFloat(val);
      if(v<37.5) return '<span class="pill ok">平熱</span>';
      if(v<38.5) return '<span class="pill warn">微熱</span>';
      return '<span class="pill danger">発熱</span>';
    }
    return '';
  }

  function miniChart(arr, field) {
    if (arr.length < 2) return '';
    const vals = arr.slice(-7).map(r=>parseFloat(r[field]));
    const mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
    const W=240,H=54,p=6;
    const pts = vals.map((v,i)=>{
      const x=p+i*(W-p*2)/(vals.length-1);
      const y=H-p-(v-mn)/rng*(H-p*2);
      return [Math.round(x),Math.round(y)];
    });
    return '<div class="chart"><svg viewBox="0 0 '+W+' '+H+'" width="100%" height="54" style="overflow:visible">'
      +'<polyline points="'+pts.map(p=>p.join(',')).join(' ')+'" fill="none" stroke="#1976d2" stroke-width="2" stroke-linejoin="round"/>'
      +pts.map(([x,y],i)=>'<circle cx="'+x+'" cy="'+y+'" r="3" fill="#fff" stroke="#1976d2" stroke-width="2"/>'
        +'<text x="'+x+'" y="'+(y-7)+'" text-anchor="middle" font-size="9" fill="#888">'+vals[i]+'</text>').join('')
      +'</svg></div>';
  }

  function render() {
    document.getElementById('root').innerHTML =
      '<div class="app">'
      +'<div class="header"><div class="logo">🏥</div><h1>家族の健康手帳</h1><span class="sync" id="syncEl">✓ 同期済み</span></div>'
      +'<div class="section"><div class="member-bar" id="mbar"></div><div class="addform" id="addform">'
      +'<input id="newname" placeholder="名前を入力" maxlength="8"/>'
      +'<button onclick="doAdd()">追加</button>'
      +'<button onclick="document.getElementById(\'addform\').style.display=\'none\'" style="background:none;border:none;font-size:22px;color:#ccc;cursor:pointer">×</button>'
      +'</div></div>'
      +'<div class="tabs">'
      +'<button class="tab'+(tab==='vital'?' active':'')+'" onclick="switchTab(\'vital\')"><span>💉</span>バイタル</button>'
      +'<button class="tab'+(tab==='exercise'?' active':'')+'" onclick="switchTab(\'exercise\')"><span>🏃</span>運動</button>'
      +'<button class="tab'+(tab==='medicine'?' active':'')+'" onclick="switchTab(\'medicine\')"><span>💊</span>服薬</button>'
      +'<button class="tab'+(tab==='temp'?' active':'')+'" onclick="switchTab(\'temp\')"><span>🌡️</span>体温</button>'
      +'</div>'
      +'<div class="content" id="content"><div class="loading"><div class="spin"></div>読み込み中...</div></div>'
      +'<div id="modal"></div>'
      +'</div>';
    renderMBar();
    renderContent();
  }

  function renderMBar() {
    const bar = document.getElementById('mbar');
    if (!bar) return;
    bar.innerHTML = '';
    members.forEach(m => {
      const w = document.createElement('div');
      w.className = 'mwrap';
      const b = document.createElement('button');
      b.className = 'mbtn' + (m===cur?' active':'');
      b.textContent = m;
      b.onclick = () => { cur=m; renderMBar(); renderContent(); };
      const e = document.createElement('button');
      e.className = 'edbtn';
      e.textContent = '✏️';
      e.onclick = ev => { ev.stopPropagation(); openEdit(m); };
      w.appendChild(b); w.appendChild(e);
      bar.appendChild(w);
    });
    const a = document.createElement('button');
    a.className = 'addbtn';
    a.textContent = '＋ 追加';
    a.onclick = () => {
      const f = document.getElementById('addform');
      f.style.display = f.style.display==='flex' ? 'none' : 'flex';
    };
    bar.appendChild(a);
  }

  async function renderContent() {
    const c = document.getElementById('content');
    if (!c || !cur) return;
    if (tab==='vital') {
      const bp = await getData(cur,'bp');
      const bs = await getData(cur,'bs');
      const lb=bp[bp.length-1], ls=bs[bs.length-1];
      c.innerHTML = '<div class="cards">'
        +'<div class="card" onclick="openRec(\'bp\')"><div class="clabel">💉 血圧（最高）</div>'
        +'<div class="cval">'+(lb?lb.sys:'--')+'<span class="cunit">mmHg</span>'+(lb?pill('bp',lb.sys):'')+'</div>'
        +'<div class="ctrend">'+(lb?lb.dia+'/'+lb.sys+' '+lb.date:'タップして記録')+'</div></div>'
        +'<div class="card" onclick="openRec(\'bs\')"><div class="clabel">🩸 血糖値</div>'
        +'<div class="cval">'+(ls?ls.val:'--')+'<span class="cunit">mg/dL</span></div>'
        +'<div class="ctrend">'+(ls?ls.timing+' '+ls.date:'タップして記録')+'</div></div>'
        +'</div>'+miniChart(bp,'sys')
        +'<div class="stitle">最近の記録</div>'
        +(bp.slice(-6).reverse().map(r=>'<div class="hrow"><span class="hdate">'+r.date+'</span><span class="hval">'+r.dia+'/'+r.sys+' mmHg</span></div>').join('')||'<div class="nodata">まだ記録がありません</div>');
    } else if (tab==='exercise') {
      const ex = await getData(cur,'exercise');
      const last=ex[ex.length-1];
      const total=ex.filter(e=>e.date===today()).reduce((s,e)=>s+parseInt(e.steps||0),0);
      const pct=Math.min(100,Math.round(total/8000*100));
      c.innerHTML = '<div class="cards">'
        +'<div class="card" onclick="openRec(\'exercise\')"><div class="clabel">👟 今日の歩数</div>'
        +'<div class="cval">'+total.toLocaleString()+'<span class="cunit">歩</span></div>'
        +'<div class="goalbar"><div class="goalfill" style="width:'+pct+'%"></div></div>'
        +'<div class="ctrend'+(total>=8000?'':' bad')+'" style="margin-top:4px">'+(total>=8000?'🎉 目標達成！':'目標 8,000 歩 ('+pct+'%)')+'</div></div>'
        +'<div class="card" onclick="openRec(\'exercise\')"><div class="clabel">🔥 運動時間</div>'
        +'<div class="cval">'+(last?last.min:'--')+'<span class="cunit">分</span></div>'
        +'<div class="ctrend">'+(last?last.type+' '+last.date:'タップして記録')+'</div></div>'
        +'</div><div class="stitle">最近の運動</div>'
        +(ex.slice(-6).reverse().map(e=>'<div class="hrow"><span class="hdate">'+e.date+'</span><span class="hval">'+e.type+' '+e.min+'分 / '+parseInt(e.steps||0).toLocaleString()+'歩</span></div>').join('')||'<div class="nodata">まだ記録がありません</div>');
    } else if (tab==='medicine') {
      const med = await getData(cur,'medicine');
      c.innerHTML = '<button class="recbtn" onclick="openRec(\'medicine\')">💊 服薬を記録する</button>'
        +'<div class="stitle">服薬記録</div>'
        +(med.slice(-10).reverse().map(m=>'<div class="hrow"><span class="hdate">'+m.date+' '+m.time+'</span><span class="hval">'+m.name+' '+m.dose+'</span></div>').join('')||'<div class="nodata">まだ記録がありません</div>');
    } else if (tab==='temp') {
      const temp = await getData(cur,'temp');
      const last=temp[temp.length-1];
      c.innerHTML = '<div class="cards" style="grid-template-columns:1fr">'
        +'<div class="card" onclick="openRec(\'temp\')"><div class="clabel">🌡️ 最新の体温</div>'
        +'<div class="cval">'+(last?last.val:'--')+'<span class="cunit">°C</span>'+(last?pill('temp',last.val):'')+'</div>'
        +'<div class="ctrend">'+(last?last.time+' '+last.date:'タップして記録')+'</div></div>'
        +'</div>'+miniChart(temp,'val')
        +'<div class="stitle">最近の記録</div>'
        +(temp.slice(-8).reverse().map(r=>'<div class="hrow"><span class="hdate">'+r.date+' '+r.time+'</span><span class="hval">'+r.val+'°C '+pill('temp',r.val)+'</span></div>').join('')||'<div class="nodata">まだ記録がありません</div>');
    }
  }

  function showModal(html) {
    document.getElementById('modal').innerHTML =
      '<div class="overlay" onclick="if(event.target===this)closeModal()">'
      +'<div class="modal"><div class="mhandle"></div>'+html+'</div></div>';
  }

  window.closeModal = () => { document.getElementById('modal').innerHTML=''; };
  window.switchTab = t => { tab=t; render(); };

  window.doAdd = async () => {
    const n = document.getElementById('newname').value.trim();
    if (!n) return;
    if (members.includes(n)) return alert('その名前はすでにあります');
    members.push(n); cur=n;
    await saveMembers();
    render();
  };

  window.openRec = type => {
    const t = new Date().toTimeString().slice(0,5);
    let body = '';
    if (type==='bp') {
      body='<h3>💉 血圧を記録</h3><label>最低血圧（下）mmHg</label><input type="number" id="f1" placeholder="75" inputmode="numeric"/><label>最高血圧（上）mmHg</label><input type="number" id="f2" placeholder="120" inputmode="numeric"/><div class="mbtns"><button class="bcnl" onclick="closeModal()">キャンセル</button><button class="bsave" onclick="saveRec(\'bp\')">保存</button></div>';
    } else if (type==='bs') {
      body='<h3>🩸 血糖値を記録</h3><label>血糖値（mg/dL）</label><input type="number" id="f1" placeholder="100" inputmode="numeric"/><label>タイミング</label><select id="f2"><option>食前</option><option>食後2時間</option><option>空腹時</option><option>就寝前</option></select><div class="mbtns"><button class="bcnl" onclick="closeModal()">キャンセル</button><button class="bsave" onclick="saveRec(\'bs\')">保存</button></div>';
    } else if (type==='exercise') {
      body='<h3>🏃 運動を記録</h3><label>種類</label><select id="f1"><option>ウォーキング</option><option>ランニング</option><option>サイクリング</option><option>筋トレ</option><option>水泳</option><option>ストレッチ</option><option>その他</option></select><label>時間（分）</label><input type="number" id="f2" placeholder="30" inputmode="numeric"/><label>歩数（任意）</label><input type="number" id="f3" placeholder="5000" inputmode="numeric"/><div class="mbtns"><button class="bcnl" onclick="closeModal()">キャンセル</button><button class="bsave" onclick="saveRec(\'exercise\')">保存</button></div>';
    } else if (type==='medicine') {
      body='<h3>💊 服薬を記録</h3><label>薬の名前</label><input type="text" id="f1" placeholder="例：血圧の薬"/><label>用量</label><input type="text" id="f2" placeholder="例：1錠"/><label>時間</label><input type="time" id="f3" value="'+t+'"/><div class="mbtns"><button class="bcnl" onclick="closeModal()">キャンセル</button><button class="bsave" onclick="saveRec(\'medicine\')">保存</button></div>';
    } else if (type==='temp') {
      body='<h3>🌡️ 体温を記録</h3><label>体温（°C）</label><input type="number" id="f1" step="0.1" placeholder="36.5" inputmode="decimal"/><label>時間</label><input type="time" id="f2" value="'+t+'"/><div class="mbtns"><button class="bcnl" onclick="closeModal()">キャンセル</button><button class="bsave" onclick="saveRec(\'temp\')">保存</button></div>';
    }
    showModal(body);
  };

  window.saveRec = async type => {
    const now = today();
    let rec = {date:now};
    if (type==='bp') {
      const v1=document.getElementById('f1').value, v2=document.getElementById('f2').value;
      if (!v1||!v2) return alert('値を入力してください');
      rec={...rec,dia:v1,sys:v2};
    } else if (type==='bs') {
      const v1=document.getElementById('f1').value;
      if (!v1) return alert('値を入力してください');
      rec={...rec,val:v1,timing:document.getElementById('f2').value};
    } else if (type==='exercise') {
      const v2=document.getElementById('f2').value;
      if (!v2) return alert('時間を入力してください');
      rec={...rec,type:document.getElementById('f1').value,min:v2,steps:document.getElementById('f3').value||'0'};
    } else if (type==='medicine') {
      const v1=document.getElementById('f1').value.trim();
      if (!v1) return alert('薬の名前を入力してください');
      rec={...rec,name:v1,dose:document.getElementById('f2').value,time:document.getElementById('f3').value};
    } else if (type==='temp') {
      const v1=document.getElementById('f1').value;
      if (!v1) return alert('値を入力してください');
      rec={...rec,val:v1,time:document.getElementById('f2').value};
    }
    closeModal();
    const existing = await getData(cur, type);
    existing.push(rec);
    await saveData(cur, type, existing);
    renderContent();
  };

  function openEdit(name) {
    showModal('<h3>✏️ メンバーを編集</h3><label>名前</label><input type="text" id="ename" value="'+name+'" maxlength="8"/>'
      +'<div class="mbtns"><button class="bcnl" onclick="closeModal()">キャンセル</button><button class="bsave" onclick="saveEdit(\''+name+'\')">保存</button></div>'
      +'<button class="bdel" onclick="confirmDel(\''+name+'\')">🗑 このメンバーを削除</button>');
    setTimeout(()=>{const i=document.getElementById('ename');if(i){i.focus();i.select();}},50);
  }
  window.openEdit = openEdit;

  window.saveEdit = async oldName => {
    const n = document.getElementById('ename').value.trim();
    if (!n) return;
    if (n===oldName) { closeModal(); return; }
    if (members.includes(n)) return alert('その名前はすでに使われています');
    members[members.indexOf(oldName)] = n;
    for (const t of ['bp','bs','exercise','medicine','temp']) {
      const d = await getData(oldName, t);
      if (d.length>0) {
        await db.collection('health').doc(n+'_'+t).set({records:d});
        await db.collection('health').doc(oldName+'_'+t).set({records:[]});
      }
    }
    if (cur===oldName) cur=n;
    await saveMembers();
    closeModal();
    render();
  };

  window.confirmDel = name => {
    showModal('<h3 style="color:#c62828">⚠️ 削除の確認</h3><p style="font-size:14px;color:#666;margin-top:8px;line-height:1.6">「'+name+'」のすべての記録を削除します。<br>この操作は元に戻せません。</p>'
      +'<div class="mbtns" style="margin-top:16px"><button class="bcnl" onclick="openEdit(\''+name+'\')">戻る</button><button class="bsave" style="background:#c62828" onclick="doDelete(\''+name+'\')">削除する</button></div>');
  };

  window.doDelete = async name => {
    members = members.filter(m=>m!==name);
    if (cur===name) cur=members[0]||'';
    await saveMembers();
    closeModal();
    render();
  };

  // 起動
  getMembers().then(list => {
    members = list;
    cur = members[0] || '';
    render();
  });
}
</script>
</body>
</html>
